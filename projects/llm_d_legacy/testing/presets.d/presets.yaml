__multiple: true

# Preset that automatically scales up GPU nodes if none exist, and scales down at the end
scale_up:
  prepare.cluster.nodes.auto_scale: true
  prepare.cluster.nodes.auto_scale_down_on_exit: true

dev:
  matbench.enabled: false
  tests.llmd.inference_service.model: facebook-opt-125m

opt-125m:
  tests.llmd.inference_service.model: facebook-opt-125m
  tests.llmd.inference_service.vllm_args[5]: "--max-model-len=2048"

psap_h200:
  extends: [llama-70b]
  tests.capture_prom: false
  tests.capture_prom_uwm: false
  tests.llmd.skip_prepare: true
  prepare.namespace.name: kpouget-dev
  prepare.cluster.skip: true
  tests.llmd.inference_service.gateway.name: gateway-internal

llmisvc_pd:
  tests.llmd.flavors: [pd-x2-ptp1-px4-dtp4]

pvc_rwx:
  prepare.pvc.name: storage-rwx
  prepare.pvc.access_mode: ReadWriteMany

azure:
  security.run_as_root: true
  prepare.preload.skip: true
  prepare.operators.skip: true
  prepare.cluster.skip: true
  prepare.rhoai.skip: true

  tests.capture_prom: false
  tests.capture_prom_uwm: false
  tests.llmd.skip_prepare: false

azure_light:
  extends: [azure, opt-125m]
  prepare.pvc.storage_class: managed-csi

cks:
  extends: [pvc_rwx, llama-70b]

  tests.capture_prom: false
  tests.capture_prom_uwm: false
  tests.llmd.inference_service.metrics.manual_capture: false
  tests.llmd.inference_service.gateway.name: gateway-internal
  tests.llmd.inference_service.image_pull_secrets: kpouget-pull-secret

  tests.llmd.skip_prepare: true
  prepare.namespace.name: kpouget-dev
  prepare.preload.node_selector_key: gpu.nvidia.com/class
  prepare.preload.node_selector_value: "H200"
  tests.llmd.inference_service.extra_properties:
    spec.template.affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/hostname
              operator: NotIn
              values:
              - gf48e48
              - gf4334a
  prepare.preload.extra_images:
    vllm-cuda-rhel9: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:094db84a1da5e8a575d0c9eade114fa30f4a2061064a338e3e032f3578f8082a
    llm-d-inference-scheduler: ghcr.io/opendatahub-io/rhaii-on-xks/llm-d-inference-scheduler:e6b5db0@sha256:43e8b8edc158f31535c8b23d77629f8cde111cc762a8f4ee5f2f884470566211
    guidellm: ghcr.io/vllm-project/guidellm:v0.5.4

baseline-flavors:
  tests.llmd.flavors: [simple, simple-tp4, simple-tp2-x4]

intelligentrouting-flavors:
  tests.llmd.flavors: [intelligentrouting-tp2-x4]

guidellm_light:
  tests.llmd.benchmarks.guidellm.load_shape_name: lightweight
  tests.llmd.benchmarks.guidellm.rate: "1,10,50"
  tests.llmd.benchmarks.guidellm.args.data: prompt_tokens=256,output_tokens=128
  tests.llmd.benchmarks.guidellm.args.max_seconds: 30

guidellm_multiturn_eval:
  tests.llmd.benchmarks.guidellm.load_shape_name: Multiturn
  tests.llmd.benchmarks.guidellm.rate: [32, 64, 128, 256, 512] # keep as a list, multi-rate not supported by guidellm-multiturn
  tests.llmd.benchmarks.guidellm.args.data: "prompt_tokens=128,output_tokens=128,turns=5,prefix_tokens=10000,prefix_count={2*rate}"
  tests.llmd.benchmarks.guidellm.args.max_requests: "{10*rate}"

guidellm_heterogeneous_eval:
  tests.llmd.benchmarks.guidellm.load_shape_name: Heterogeneous
  tests.llmd.benchmarks.guidellm.rate: "1,10,50,100,200,300"
  tests.llmd.benchmarks.guidellm.args.data: prompt_tokens=8000,prompt_tokens_stdev=8500,prompt_tokens_min=50,prompt_tokens_max=30000,output_tokens=800,output_tokens_stdev=1500,output_tokens_min=20,output_tokens_max=8000
  tests.llmd.benchmarks.guidellm.args.max_seconds: 600

gpt-oss:
  tests.llmd.inference_service.model: gpt-oss-120
  tests.llmd.benchmarks.guidellm.args.request_type: text_completions

llama-70b:
  tests.llmd.inference_service.model: llama3-3-70b
