approximate-prefix-cache:
  replicas: 4
  tensor_parallelism: 2
  scheduler:
    template:
      containers:
        - name: main
          env:
            - name: TOKENIZER_CACHE_DIR
              value: /tmp/tokenizer-cache
            - name: HF_HOME
              value: /tmp/tokenizer-cache
            - name: TRANSFORMERS_CACHE
              value: /tmp/tokenizer-cache
            - name: XDG_CACHE_HOME
              value: /tmp
          args:
            - --cert-path
            - /var/run/kserve/tls
            - --pool-group
            - inference.networking.x-k8s.io
            - --pool-name
            - "{{ ChildName .ObjectMeta.Name `-inference-pool` }}"
            - --pool-namespace
            - "{{ .ObjectMeta.Namespace }}"
            - --zap-encoder
            - json
            - --grpc-port
            - "9002"
            - --grpc-health-port
            - "9003"
            - --secure-serving
            - --model-server-metrics-scheme
            - https
            - --config-text
            - |
              apiVersion: inference.networking.x-k8s.io/v1alpha1
              kind: EndpointPickerConfig
              plugins:
                - type: queue-scorer
                - type: kv-cache-utilization-scorer
                - type: prefix-cache-scorer
              schedulingProfiles:
                - name: default
                  plugins:
                    - pluginRef: queue-scorer
                      weight: 2
                    - pluginRef: kv-cache-utilization-scorer
                      weight: 2
                    - pluginRef: prefix-cache-scorer
                      weight: 3
          volumeMounts:
            - name: tokenizer-cache
              mountPath: /tmp/tokenizer-cache
            - name: cachi2-cache
              mountPath: /cachi2
      volumes:
        - name: tokenizer-cache
          emptyDir: {}
        - name: cachi2-cache
          emptyDir: {}
  vllm_args:
    - --max-model-len=8192
    - --gpu-memory-utilization=0.92
    - --trust-remote-code
    - --no-enable-log-requests
    - --enable-prefix-caching

precise-prefix-cache:
  replicas: 4
  tensor_parallelism: 2
  scheduler:
    template:
      containers:
        - name: main
          env:
            - name: TOKENIZER_CACHE_DIR
              value: /tmp/tokenizer-cache
            - name: HF_HOME
              value: /tmp/tokenizer-cache
            - name: TRANSFORMERS_CACHE
              value: /tmp/tokenizer-cache
            - name: XDG_CACHE_HOME
              value: /tmp
          args:
            - --cert-path
            - /var/run/kserve/tls
            - --pool-group
            - inference.networking.x-k8s.io
            - --pool-name
            - "{{ ChildName .ObjectMeta.Name `-inference-pool` }}"
            - --pool-namespace
            - "{{ .ObjectMeta.Namespace }}"
            - --zap-encoder
            - json
            - --grpc-port
            - "9002"
            - --grpc-health-port
            - "9003"
            - --secure-serving
            - --model-server-metrics-scheme
            - https
            - --config-text
            - |
              apiVersion: inference.networking.x-k8s.io/v1alpha1
              kind: EndpointPickerConfig
              plugins:
                # TODO: Align this profile with the upstream precise-prefix-cache-routing guide.
                # Upstream now uses precise-prefix-cache-producer + prefix-cache-scorer, with
                # vLLM KV events published over ZMQ (KV_EVENTS_ENDPOINT=tcp://*:5556), instead
                # of the older precise-prefix-cache-scorer-only configuration kept here.
                - type: single-profile-handler
                - type: precise-prefix-cache-scorer
                  parameters:
                    indexerConfig:
                      tokenProcessorConfig:
                        blockSize: 64
                        hashSeed: "42"
                      tokenizersPoolConfig:
                        hf:
                          tokenizersCacheDir: /tmp/tokenizers
                - type: kv-cache-utilization-scorer
                - type: queue-scorer
                - type: max-score-picker
              schedulingProfiles:
                - name: default
                  plugins:
                    - pluginRef: precise-prefix-cache-scorer
                      weight: 3.0
                    - pluginRef: kv-cache-utilization-scorer
                      weight: 2.0
                    - pluginRef: queue-scorer
                      weight: 2.0
                    - pluginRef: max-score-picker
          volumeMounts:
            - name: tokenizer-cache
              mountPath: /tmp/tokenizer-cache
            - name: cachi2-cache
              mountPath: /cachi2
      volumes:
        - name: tokenizer-cache
          emptyDir: {}
        - name: cachi2-cache
          emptyDir: {}
  vllm_args:
    - --max-model-len=8192
    - --gpu-memory-utilization=0.92
    - --trust-remote-code
    - --no-enable-log-requests
    - --enable-prefix-caching

distributed-default:
  replicas: 4
  tensor_parallelism: 2
  scheduler: {}
  vllm_args:
    - --max-model-len=8192
    - --gpu-memory-utilization=0.92
    - --trust-remote-code
    - --no-enable-log-requests
    - --enable-prefix-caching
